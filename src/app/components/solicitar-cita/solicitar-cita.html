<div class="solicitar-citas-container">

  <div class="card-cita">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Tipo cita</label>
        <select [(ngModel)]="id_tipo" name="id_tipo" class="custom-select">
          <option [ngValue]="null">Selecciona un tipo de cita</option>
          <option *ngFor="let tipoCita of tiposCitas" [ngValue]="tipoCita.id">
            {{ tipoCita.nombre }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Especialidad</label>
        <select [(ngModel)]="id_especialidad" name="id_especialidad" class="custom-select">
          <option [ngValue]="null">Selecciona una especialidad</option>
          <option *ngFor="let especialidad of especialidades" [ngValue]="especialidad.id">
            {{ especialidad.nombre }}
          </option>
        </select>
      </div>

      <button type="button" 
        class="btn-solicitar"
        (click)="generarSlots()">

        Generar
      </button>
    </div>
  
  </div>
  @for (slot of slots; track $index) {
    <div class="card-cita">
    <div class="form-grid">
      <div class="form-group">
        <label type="text" class="form-label">Fecha:</label>
        <input type="text" class="custom-input" [(ngModel)]="slot.fechaDisplay" [readonly]="true">
      </div>
      <div class="form-group">
        <label type="text" class="form-label">Costo:</label>
        <input type="text" class="custom-input" [(ngModel)]="slot.costo" [readonly]="true">
      </div>
      <div class="form-group">
        <label type="text" class="form-label">Medico:</label>
        <input type="text" class="custom-input" [(ngModel)]="slot.nombreMedico" [readonly]="true">
      </div>
      <div class="form-group">
        <label type="text" class="form-label">Ciudad:</label>
        <input type="text" class="custom-input" [(ngModel)]="slot.nombreCiudad" [readonly]="true">
      </div>
      <div class="form-group">
        <label type="text" class="form-label">Hospital:</label>
        <input type="text" class="custom-input" [(ngModel)]="slot.nombreHospital" [readonly]="true">
      </div>
      <div class="form-group">
        <button type="button" class="btn-solicitar" (click)="agendarCita($index)">Agendar Cita</button>
      </div>
    </div>
  </div>
  }
</div>
