<div class="historial-container">

  <div class="registros-lista">

    <div class="registro-card" *ngFor="let registro of registros">

      <!-- Fila superior: Centro Médico, Fecha, Médico -->
      <div class="registro-grid-top">

        <div class="form-group">
          <label class="form-label">Centro Médico</label>
          <select class="custom-select">
            <option>{{ registro.centro }}</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Fecha</label>
          <div class="fecha-input">
            <span>{{ registro.fecha }}</span>
            <i class="bi bi-calendar3"></i>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Médico</label>
          <select class="custom-select">
            <option>{{ registro.medico }}</option>
          </select>
        </div>

      </div>

      <!-- Motivo del ingreso -->
      <div class="form-group">
        <label class="form-label">Motivo Del Ingreso</label>
        <div class="motivo-box">{{ registro.motivo }}</div>
      </div>

      <!-- Triage -->
      <div class="triage-section">
        <label class="form-label">Triage</label>
        <div class="triage-opciones">
          <div
            class="triage-item"
            *ngFor="let p of prioridades"
            [class.activo]="p === registro.triage"
          >
            <span class="triage-label">{{ p }}</span>
            <span class="triage-circulo" [class.activo]="p === registro.triage"></span>
          </div>
        </div>
      </div>

      <!-- Incapacidad -->
      <div class="incapacidad-row">

        <div class="incapacidad-item">
          <label class="form-label">Incapacidad Retroactiva:</label>
          <select class="custom-select-sm">
            <option>{{ registro.incapacidad }}</option>
          </select>
        </div>

        <div class="incapacidad-item">
          <label class="form-label">Presunto origen:</label>
          <div class="tag">{{ registro.origen }}</div>
        </div>

        <div class="incapacidad-item">
          <label class="form-label">Tipo Incapacidad:</label>
          <select class="custom-select-sm">
            <option>{{ registro.tipoIncapacidad }}</option>
          </select>
        </div>

      </div>

      <!-- Código de servicio -->
      <div class="form-group">
        <label class="form-label">Codigo de Servicio Medico</label>
        <div class="codigo-box">{{ registro.codigoServicio }}</div>
      </div>

    </div>

  </div>

</div>
